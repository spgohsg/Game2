<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Card Game</title>
    <!-- Include free PeerJS library for serverless multiplayer connections -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --primary: #4F46E5; --success: #10B981; --danger: #EF4444; --gray: #6B7280; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #F3F4F6; margin: 0; padding: 20px; color: #1F2937; text-align: center; }
        .card { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: var(--primary); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 16px; text-align: center; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 85%; margin: 8px 0; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #D1D5DB !important; cursor: not-allowed; color: var(--gray); }
        .hidden { display: none !important; }
        .room-id-box { background: #EEF2F6; padding: 10px; border-radius: 6px; font-size: 18px; font-weight: bold; color: var(--primary); letter-spacing: 1px; margin: 15px 0; border: 1px dashed var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .emotion-btn { background: #F9FAFB; color: #374151; border: 2px solid #E5E7EB; padding: 14px 10px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin: 0; }
        .emotion-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .emotion-btn.taken { background: #E5E7EB; color: #9CA3AF; border-color: #E5E7EB; cursor: not-allowed; text-decoration: line-through; }
        .player-tag { background: #E0E7FF; color: #4338CA; padding: 6px 12px; border-radius: 20px; display: inline-block; margin: 5px; font-size: 14px; font-weight: 500; }
        .player-list-item { background: #F9FAFB; padding: 10px; border-radius: 6px; margin: 5px 0; text-align: left; display: flex; justify-content: space-between; align-items: center; border: 1px solid #E5E7EB; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge.waiting { background: #FEF3C7; color: #D97706; }
        .badge.ready { background: #D1FAE5; color: #065F46; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎭 情绪卡牌游戏</h1>
    
    <!-- STEP 1: LOGIN/ROOM SELECTION SCREEN -->
    <div id="setupScreen">
        <input type="text" id="playerNameInput" placeholder="输入你的名字 / Your Name" maxlength="15">
        <hr style="margin:20px 0; border:0; border-top:1px solid #E5E7EB;">
        <button id="createRoomBtn">创建新房间 (我是房东)</button>
        <div style="margin: 10px 0; color: var(--gray); font-size: 14px;">— 或者 / OR —</div>
        <input type="text" id="roomIdInput" placeholder="输入房间代码 / Room ID">
        <button id="joinRoomBtn" style="background: var(--success);">加入已有房间</button>
    </div>

    <!-- STEP 2: HOST BOARD SCREEN -->
    <div id="hostScreen" class="hidden">
        <p>把这个房间代码发送给其他 7 位玩家：</p>
        <div class="room-id-box" id="hostRoomIdDisplay">--------</div>
        <h3>已连线的玩家名单：</h3>
        <div id="hostPlayerList"></div>
        <button id="revealBtn" style="background: var(--success); margin-top:20px;" disabled>结束猜测，揭晓答案！</button>
    </div>

    <!-- STEP 3: PLAYER SCREEN -->
    <div id="playerScreen" class="hidden">
        <p>你好 <span id="playerGreeting" style="font-weight:bold; color:var(--primary);"></span>，请秘密选择一个你目前持有的情绪卡：</p>
        <div class="grid" id="emotionsGrid"></div>
        <button id="lockBtn" style="margin-top: 20px;" disabled>确认锁定该情绪</button>
        <div id="lockStatusMsg" style="margin-top:10px; font-weight:bold; color:var(--success);" class="hidden">✓ 已锁定！请等待房东揭晓。</div>
    </div>
    
    <!-- STEP 4: FINAL REVEAL SCREEN -->
    <div id="revealScreen" class="hidden">
        <h2>🎉 游戏结果揭晓 🎉</h2>
        <div id="finalResultsList" style="margin: 20px 0;"></div>
        <button onclick="window.location.reload()" style="background: var(--danger);">重新开始游戏</button>
    </div>
</div>

<script>
    const emotionsList = ["害怕", "焦虑", "反感", "厌恶", "期待", "惊讶", "开心", "接受", "伤心", "生气", "尴尬", "失落"];
    
    let peer = null;
    let conn = null; // Used by player to speak to host
    let connections = []; // Used by host to track all players
    let isHost = false;
    let myName = "";
    let selectedEmotionIndex = null;
    let isLocked = false;
    
    // Game Data Structures
    let playerData = {}; // Host uses this: { peerId: { name: "John", emotion: "开心", locked: true } }
    let takenEmotions = []; // Synced array of emotion strings currently taken

    // UI Elements
    const setupScreen = document.getElementById('setupScreen');
    const hostScreen = document.getElementById('hostScreen');
    const playerScreen = document.getElementById('playerScreen');
    const revealScreen = document.getElementById('revealScreen');
    
    // --- HOST LOGIC ---
    document.getElementById('createRoomBtn').addEventListener('click', () => {
        myName = document.getElementById('playerNameInput').value.trim() || "房东";
        isHost = true;
        
        // Generate a clean 5-digit Room ID
        const roomId = Math.floor(10000 + Math.random() * 90000).toString();
        
        peer = new Peer(roomId);
        
        peer.on('open', (id) => {
            setupScreen.classList.add('hidden');
            hostScreen.classList.remove('hidden');
            document.getElementById('hostRoomIdDisplay').innerText = id;
            
            // Add host to their own player tracking dataset
            playerData[peer.id] = { name: myName + " (房东)", emotion: null, locked: false };
            updateHostPlayerListUI();
        });

        peer.on('connection', (connection) => {
            connections.push(connection);
            
            connection.on('data', (data) => {
                if (data.type === 'join') {
                    playerData[connection.peer] = { name: data.name, emotion: null, locked: false };
                    updateHostPlayerListUI();
                    // Send current status of taken cards back to the newly joined player
                    broadcastToPlayers({ type: 'syncTaken', taken: takenEmotions });
                }
                
                if (data.type === 'lock') {
                    playerData[connection.peer].emotion = data.emotion;
                    playerData[connection.peer].locked = true;
                    
                    // Add this emotion to global lockout tracker
                    if(!takenEmotions.includes(data.emotion)) {
                        takenEmotions.push(data.emotion);
                    }
                    
                    updateHostPlayerListUI();
                    // Globally disable this card across all active players' screens
                    broadcastToPlayers({ type: 'syncTaken', taken: takenEmotions });
                }
            });
            
            connection.on('close', () => {
                connections = connections.filter(c => c.peer !== connection.peer);
                delete playerData[connection.peer];
                updateHostPlayerListUI();
            });
        });

        peer.on('error', (err) => {
            alert("房间创建失败，请重试！ Error: " + err.type);
        });
    });

    function updateHostPlayerListUI() {
        const listContainer = document.getElementById('hostPlayerList');
        listContainer.innerHTML = "";
        let totalPlayers = 0;
        let lockedCount = 0;

        for (let id in playerData) {
            totalPlayers++;
            const p = playerData[id];
            if (p.locked) lockedCount++;

            const item = document.createElement('div');
            item.classList.add('player-list-item');
            item.innerHTML = `
                <span>👤 <strong>${p.name}</strong></span>
                <span class="badge ${p.locked ? 'ready' : 'waiting'}">${p.locked ? '✓ 已选择' : '⏳ 选择中'}</span>
            `;
            listContainer.appendChild(item);
        }
        
        // Enable host reveal trigger button if players have locked choices
        document.getElementById('revealBtn').disabled = (lockedCount === 0);
    }

    function broadcastToPlayers(msg) {
        connections.forEach(conn => {
            if (conn.open) conn.send(msg);
        });
    }

    document.getElementById('revealBtn').addEventListener('click', () => {
        const payload = { type: 'finalReveal', results: Object.values(playerData) };
        broadcastToPlayers(payload);
        showFinalRevealUI(Object.values(playerData));
    });


    // --- PLAYER LOGIC ---
    document.getElementById('joinRoomBtn').addEventListener('click', () => {
        myName = document.getElementById('playerNameInput').value.trim();
        const targetRoomId = document.getElementById('roomIdInput').value.trim();
        
        if (!myName) return alert("请先输入您的名字！Please enter your name first.");
        if (!targetRoomId) return alert("请指定要加入的房间ID！Please input a Room ID.");
        
        peer = new Peer(); // Let system auto-assign client ID
        
        peer.on('open', () => {
            conn = peer.connect(targetRoomId);
            
            conn.on('open', () => {
                setupScreen.classList.add('hidden');
                playerScreen.classList.remove('hidden');
                document.getElementById('playerGreeting').innerText = myName;
                buildEmotionsGridUI();
                
// Alert host about the new joiner parameters
conn.send({ type: 'join', name: myName });});

conn.on('data', (data) => {
if (data.type === 'syncTaken') {updateAvailableCardsUI(data.taken);
}
if (data.type === 'finalReveal') {showFinalRevealUI(data.results);}});

conn.on('close', () => {
alert("与主服务器连接已断开。 Connection lost to host.");
window.location.reload();});});

peer.on('error', (err) => {alert("无法连上该房间，请仔细检查房间代码是否正确。");});});

function buildEmotionsGridUI() {
const grid = document.getElementById('emotionsGrid');
grid.innerHTML = "";


emotionsList.forEach((emotion, index) => {
const btn = document.createElement('button');
btn.classList.add('emotion-btn');
btn.innerText = ${index + 1}. ${emotion};
btn.dataset.emotion = emotion;

btn.addEventListener('click', () => {
if (isLocked || btn.classList.contains('taken')) return;

// Deselect previous selection
document.querySelectorAll('.emotion-btn').forEach(b => 
b.classList.remove('selected'));

// Select clicked button
btn.classList.add('selected');
selectedEmotionIndex = index;
document.getElementById('lockBtn').disabled = false;});

grid.appendChild(btn);});}

function updateAvailableCardsUI(takenList) {
document.querySelectorAll('.emotion-btn').forEach(btn => {const emo = btn.dataset.emotion;if (takenList.includes(emo)) {btn.classList.add('taken');
// If a card gets taken by someone else while currently selected, remove selection configuration
if (btn.classList.contains('selected')) {
btn.classList.remove('selected');
document.getElementById('lockBtn').disabled = true;selectedEmotionIndex = null;}} else {
btn.classList.remove('taken');}});}

document.getElementById('lockBtn').addEventListener('click', () => {
if (selectedEmotionIndex === null || isLocked) return;

isLocked = true;
const finalChoice = emotionsList[selectedEmotionIndex];

// Push payload data pipeline up to the host peer engine

conn.send({ type: 'lock', emotion: finalChoice });
// Lock out entire user interface controls
document.getElementById('lockBtn').disabled = true;
document.getElementById('lockStatusMsg').classList.remove('hidden');
document.querySelectorAll('.emotion-btn').forEach(b => {
if(!b.classList.contains('selected')) {
b.disabled = true;
b.style.opacity = 0.5;
}});});

// --- SHARED ENDGAME UI ---
function showFinalRevealUI(results) {
hostScreen.classList.add('hidden');
playerScreen.classList.add('hidden');
revealScreen.classList.remove('hidden');

const list = document.getElementById('finalResultsList');
list.innerHTML = "";

results.forEach(p => {
const row = document.createElement('div');
row.classList.add('player-list-item');
const displayEmotion = p.emotion ? p.emotion : "未选择 (No Choice)";
row.innerHTML = <span>👤 <strong>${p.name}</strong></span> <span style="font-size:18px; 
font-weight:bold; color:var(--primary);
">${displayEmotion}</span>;
list.appendChild(row);
});
}
