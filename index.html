<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Card Game</title>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>

  <style>
    :root {
      --primary: #4F46E5;
      --success: #10B981;
      --danger: #EF4444;
      --gray: #6B7280;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #F3F4F6;
      margin: 0;
      padding: 20px;
      color: #1F2937;
      text-align: center;
    }

    .card {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      color: var(--primary);
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      font-size: 16px;
      text-align: center;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 85%;
      margin: 8px 0;
    }

    button:disabled {
      background: #D1D5DB !important;
      cursor: not-allowed;
      color: var(--gray);
    }

    .hidden {
      display: none !important;
    }

    .room-id-box {
      background: #EEF2FF;
      padding: 10px;
      border-radius: 6px;
      font-size: 24px;
      font-weight: bold;
      color: var(--primary);
      letter-spacing: 2px;
      margin: 15px 0;
      border: 1px dashed var(--primary);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .emotion-btn {
      background: #F9FAFB;
      color: #374151;
      border: 2px solid #E5E7EB;
      padding: 14px 10px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin: 0;
    }

    .emotion-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .emotion-btn.taken {
      background: #E5E7EB;
      color: #9CA3AF;
      border-color: #E5E7EB;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .player-list-item {
      background: #F9FAFB;
      padding: 10px;
      border-radius: 6px;
      margin: 5px 0;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #E5E7EB;
      gap: 10px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge.waiting {
      background: #FEF3C7;
      color: #D97706;
    }

    .badge.ready {
      background: #D1FAE5;
      color: #065F46;
    }

    .small-note {
      color: var(--gray);
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎭 情绪卡牌游戏</h1>

    <div id="setupScreen">
      <input type="text" id="playerNameInput" placeholder="输入你的名字 / Your Name" maxlength="15" />

      <hr style="margin:20px 0; border:0; border-top:1px solid #E5E7EB;" />

      <button id="createRoomBtn">创建新房间 (我是房东)</button>

      <div style="margin: 10px 0; color: var(--gray); font-size: 14px;">
        — 或者 / OR —
      </div>

      <input type="text" id="roomIdInput" placeholder="输入5位房间代码 / Room ID" maxlength="10" />
      <button id="joinRoomBtn" style="background: var(--success);">加入已有房间</button>

      <div id="setupStatus" class="small-note"></div>
    </div>

    <div id="hostScreen" class="hidden">
      <p>把这个房间代码发送给其他玩家：</p>
      <div class="room-id-box" id="hostRoomIdDisplay">-----</div>
      <p class="small-note">等待玩家加入...</p>

      <h3>已连线的玩家名单：</h3>
      <div id="hostPlayerList"></div>

      <button id="revealBtn" style="background: var(--success); margin-top:20px;" disabled>
        结束猜测，揭晓答案！
      </button>
    </div>

    <div id="playerScreen" class="hidden">
      <p>
        你好
        <span id="playerGreeting" style="font-weight:bold; color:var(--primary);"></span>，
        请秘密选择一个你目前持有的情绪卡：
      </p>

      <div class="grid" id="emotionsGrid"></div>

      <button id="lockBtn" style="margin-top: 20px;" disabled>
        确认锁定该情绪
      </button>

      <div id="lockStatusMsg" style="margin-top:10px; font-weight:bold; color:var(--success);" class="hidden">
        ✓ 已锁定！请等待房东揭晓。
      </div>
    </div>

    <div id="revealScreen" class="hidden">
      <h2>🎉 游戏结果揭晓 🎉</h2>
      <div id="finalResultsList" style="margin: 20px 0;"></div>

      <button onclick="window.location.reload()" style="background: var(--danger);">
        重新开始游戏
      </button>
    </div>
  </div>

  <script>
    const emotionsList = [
      "害怕", "焦虑", "反感", "厌恶",
      "期待", "惊讶", "开心", "接受",
      "伤心", "生气", "尴尬", "失落"
    ];

    let peer = null;
    let conn = null;
    let connections = [];
    let myName = "";
    let selectedEmotionIndex = null;
    let isLocked = false;

    let playerData = {};
    let takenEmotions = [];

    const setupScreen = document.getElementById("setupScreen");
    const hostScreen = document.getElementById("hostScreen");
    const playerScreen = document.getElementById("playerScreen");
    const revealScreen = document.getElementById("revealScreen");
    const setupStatus = document.getElementById("setupStatus");

    function setStatus(message) {
      setupStatus.innerText = message || "";
    }

    function showScreen(screen) {
      setupScreen.classList.add("hidden");
      hostScreen.classList.add("hidden");
      playerScreen.classList.add("hidden");
      revealScreen.classList.add("hidden");
      screen.classList.remove("hidden");
    }

    function generateRoomId() {
      return "ROOM-" + Math.floor(10000 + Math.random() * 90000);
    }

    function normalizeRoomId(value) {
      value = value.trim().toUpperCase();

      if (/^\d{5}$/.test(value)) {
        return "ROOM-" + value;
      }

      return value;
    }

    function getPlayerName(defaultName) {
      return document.getElementById("playerNameInput").value.trim() || defaultName;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("createRoomBtn").addEventListener("click", () => {
      if (typeof Peer === "undefined") {
        alert("PeerJS 没有成功载入。请检查网络或 CDN 是否被阻挡。");
        return;
      }

      myName = getPlayerName("房东");

      const roomId = generateRoomId();
      const displayRoomId = roomId.replace("ROOM-", "");

      showScreen(hostScreen);
      document.getElementById("hostRoomIdDisplay").innerText = displayRoomId;

      playerData[roomId] = {
        name: myName + " (房东)",
        emotion: null,
        locked: false
      };

      updateHostPlayerListUI();

      peer = new Peer(roomId, {
        host: "0.peerjs.com",
        port: 443,
        path: "/",
        secure: true,
        debug: 2
      });

      peer.on("open", (id) => {
        console.log("Room created:", id);
      });

      peer.on("connection", (connection) => {
        connections.push(connection);

        connection.on("open", () => {
          console.log("Player connected:", connection.peer);
        });

        connection.on("data", (data) => {
          if (!data || !data.type) return;

          if (data.type === "join") {
            playerData[connection.peer] = {
              name: data.name || "玩家",
              emotion: null,
              locked: false
            };

            updateHostPlayerListUI();

            connection.send({
              type: "syncTaken",
              taken: takenEmotions
            });
          }

          if (data.type === "lock") {
            if (takenEmotions.includes(data.emotion)) {
              connection.send({
                type: "lockRejected",
                message: "这张情绪卡已经被其他玩家选择了，请重新选择。"
              });
              return;
            }

            if (!playerData[connection.peer]) {
              playerData[connection.peer] = {
                name: "玩家",
                emotion: null,
                locked: false
              };
            }

            playerData[connection.peer].emotion = data.emotion;
            playerData[connection.peer].locked = true;

            takenEmotions.push(data.emotion);

            updateHostPlayerListUI();

            broadcastToPlayers({
              type: "syncTaken",
              taken: takenEmotions
            });

            connection.send({
              type: "lockAccepted",
              emotion: data.emotion
            });
          }
        });

        connection.on("close", () => {
          const removedPlayer = playerData[connection.peer];

          if (removedPlayer && removedPlayer.emotion) {
            takenEmotions = takenEmotions.filter(e => e !== removedPlayer.emotion);
          }

          connections = connections.filter(c => c.peer !== connection.peer);
          delete playerData[connection.peer];

          updateHostPlayerListUI();

          broadcastToPlayers({
            type: "syncTaken",
            taken: takenEmotions
          });
        });

        connection.on("error", (err) => {
          console.error("Connection error:", err);
        });
      });

      peer.on("error", (err) => {
        console.error("Host PeerJS error:", err);
        alert("PeerJS 连接错误：" + err.message);
      });
    });

    document.getElementById("joinRoomBtn").addEventListener("click", () => {
      if (typeof Peer === "undefined") {
        alert("PeerJS 没有成功载入。请检查网络或 CDN 是否被阻挡。");
        return;
      }

      myName = getPlayerName("");
      const targetRoomId = normalizeRoomId(document.getElementById("roomIdInput").value);

      if (!myName) {
        alert("请先输入您的名字！");
        return;
      }

      if (!targetRoomId) {
        alert("请输入房间代码！");
        return;
      }

      setStatus("正在连接房间...");

      peer = new Peer(null, {
        host: "0.peerjs.com",
        port: 443,
        path: "/",
        secure: true,
        debug: 2
      });

      peer.on("open", () => {
        conn = peer.connect(targetRoomId, {
          reliable: true
        });

        conn.on("open", () => {
          showScreen(playerScreen);

          document.getElementById("playerGreeting").innerText = myName;

          buildEmotionsGridUI();

          conn.send({
            type: "join",
            name: myName
          });
        });

        conn.on("data", (data) => {
          if (!data || !data.type) return;

          if (data.type === "syncTaken") {
            updateAvailableCardsUI(data.taken || []);
          }

          if (data.type === "lockAccepted") {
            confirmLockUI();
          }

          if (data.type === "lockRejected") {
            alert(data.message || "这张卡已经被选择了，请重新选择。");
            resetLockAttemptUI();
          }

          if (data.type === "finalReveal") {
            showFinalRevealUI(data.results || []);
          }
        });

        conn.on("close", () => {
          alert("与房东的连接已断开。");
        });

        conn.on("error", (err) => {
          console.error("Player connection error:", err);
          alert("连接房间失败：" + err.message);
        });
      });

      peer.on("error", (err) => {
        console.error("Player PeerJS error:", err);
        alert("无法连上该房间。请检查房间代码。错误：" + err.message);
      });
    });

    function updateHostPlayerListUI() {
      const listContainer = document.getElementById("hostPlayerList");
      listContainer.innerHTML = "";

      let lockedCount = 0;

      for (const id in playerData) {
        const p = playerData[id];

        if (p.locked) lockedCount++;

        const item = document.createElement("div");
        item.classList.add("player-list-item");

        item.innerHTML = `
          <span>👤 <strong>${escapeHtml(p.name)}</strong></span>
          <span class="badge ${p.locked ? "ready" : "waiting"}">
            ${p.locked ? "✓ 已选择" : "⏳ 选择中"}
          </span>
        `;

        listContainer.appendChild(item);
      }

      document.getElementById("revealBtn").disabled = lockedCount === 0;
    }

    function broadcastToPlayers(message) {
      connections.forEach(connection => {
        if (connection && connection.open) {
          connection.send(message);
        }
      });
    }

    document.getElementById("revealBtn").addEventListener("click", () => {
      const results = Object.values(playerData);

      broadcastToPlayers({
        type: "finalReveal",
        results: results
      });

      showFinalRevealUI(results);
    });

    function buildEmotionsGridUI() {
      const grid = document.getElementById("emotionsGrid");
      grid.innerHTML = "";

      emotionsList.forEach((emotion, index) => {
        const btn = document.createElement("button");

        btn.classList.add("emotion-btn");
        btn.innerText = `${index + 1}. ${emotion}`;
        btn.dataset.emotion = emotion;

        btn.addEventListener("click", () => {
          if (isLocked || btn.classList.contains("taken")) return;

          document.querySelectorAll(".emotion-btn").forEach(b => {
            b.classList.remove("selected");
          });

          btn.classList.add("selected");
          selectedEmotionIndex = index;

          document.getElementById("lockBtn").disabled = false;
        });

        grid.appendChild(btn);
      });
    }

    function updateAvailableCardsUI(takenList) {
      document.querySelectorAll(".emotion-btn").forEach(btn => {
        const emotion = btn.dataset.emotion;

        if (takenList.includes(emotion)) {
          btn.classList.add("taken");

          if (!btn.classList.contains("selected")) {
            btn.disabled = true;
          }

          if (btn.classList.contains("selected") && !isLocked) {
            btn.classList.remove("selected");
            selectedEmotionIndex = null;
            document.getElementById("lockBtn").disabled = true;
          }
        } else {
          if (!isLocked) {
            btn.classList.remove("taken");
            btn.disabled = false;
            btn.style.opacity = 1;
          }
        }
      });
    }

    document.getElementById("lockBtn").addEventListener("click", () => {
      if (selectedEmotionIndex === null || isLocked) return;

      if (!conn || !conn.open) {
        alert("尚未连接到房间，请重新加入。");
        return;
      }

      const finalChoice = emotionsList[selectedEmotionIndex];

      document.getElementById("lockBtn").disabled = true;

      conn.send({
        type: "lock",
        emotion: finalChoice
      });
    });

    function confirmLockUI() {
      isLocked = true;

      document.getElementById("lockBtn").disabled = true;
      document.getElementById("lockStatusMsg").classList.remove("hidden");

      document.querySelectorAll(".emotion-btn").forEach(btn => {
        if (!btn.classList.contains("selected")) {
          btn.disabled = true;
          btn.style.opacity = 0.5;
        }
      });
    }

    function resetLockAttemptUI() {
      isLocked = false;
      selectedEmotionIndex = null;

      document.getElementById("lockBtn").disabled = true;

      document.querySelectorAll(".emotion-btn").forEach(btn => {
        btn.classList.remove("selected");
      });
    }

    function showFinalRevealUI(results) {
      showScreen(revealScreen);

      const list = document.getElementById("finalResultsList");
      list.innerHTML = "";

      results.forEach(p => {
        const row = document.createElement("div");
        row.classList.add("player-list-item");

        row.innerHTML = `
          <span>👤 <strong>${escapeHtml(p.name || "玩家")}</strong></span>
          <span style="font-size:18px; font-weight:bold; color:var(--primary);">
            ${escapeHtml(p.emotion || "未选择")}
          </span>
        `;

        list.appendChild(row);
      });
    }
  </script>
</body>
</html>
