<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Card Game</title>

  <style>
    :root {
      --primary: #4F46E5;
      --success: #10B981;
      --danger: #EF4444;
      --gray: #6B7280;
      --gold: #F59E0B;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #F3F4F6;
      margin: 0;
      padding: 20px;
      color: #1F2937;
      text-align: center;
    }

    .card {
      max-width: 540px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      color: var(--primary);
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      font-size: 16px;
      text-align: center;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 85%;
      margin: 8px 0;
    }

    button:disabled {
      background: #D1D5DB !important;
      cursor: not-allowed;
      color: var(--gray);
    }

    .hidden {
      display: none !important;
    }

    .room-id-box {
      background: #EEF2FF;
      padding: 10px;
      border-radius: 6px;
      font-size: 28px;
      font-weight: bold;
      color: var(--primary);
      letter-spacing: 3px;
      margin: 15px 0;
      border: 1px dashed var(--primary);
    }

    .round-box {
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      padding: 12px;
      border-radius: 8px;
      margin: 12px 0;
    }

    .host-name {
      color: var(--gold);
      font-weight: bold;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .emotion-btn {
      background: #F9FAFB;
      color: #374151;
      border: 2px solid #E5E7EB;
      padding: 14px 10px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin: 0;
    }

    .emotion-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .player-list-item {
      background: #F9FAFB;
      padding: 10px;
      border-radius: 6px;
      margin: 5px 0;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #E5E7EB;
      gap: 10px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge.waiting {
      background: #FEF3C7;
      color: #D97706;
    }

    .badge.ready {
      background: #D1FAE5;
      color: #065F46;
    }

    .badge.host {
      background: #FEF3C7;
      color: #92400E;
    }

    .badge.score {
      background: #E0E7FF;
      color: #3730A3;
    }

    .badge.plus {
      background: #D1FAE5;
      color: #065F46;
    }

    .small-note {
      color: var(--gray);
      font-size: 14px;
      margin-top: 8px;
    }

    hr {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #E5E7EB;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎭 情绪卡牌游戏</h1>

    <div id="setupScreen">
      <input type="text" id="playerNameInput" placeholder="输入你的名字 / Your Name" maxlength="15" />

      <hr />

      <button id="createRoomBtn">创建新房间 (我是房东)</button>

      <div style="margin: 10px 0; color: var(--gray); font-size: 14px;">
        — 或者 / OR —
      </div>

      <input type="text" id="roomIdInput" placeholder="输入5位房间代码 / Room ID" maxlength="5" />
      <button id="joinRoomBtn" style="background: var(--success);">加入已有房间</button>

      <div id="setupStatus" class="small-note"></div>
    </div>

    <div id="hostScreen" class="hidden">
      <p>把这个房间代码发送给其他玩家：</p>
      <div class="room-id-box" id="hostRoomIdDisplay">-----</div>

      <div class="round-box">
        <div>第 <span id="hostRoundNumber">1</span> 回合</div>
        <div>本轮主持人：</div>
        <div class="host-name" id="hostCurrentRoundHost">---</div>
      </div>

      <hr />

      <h3>请选择你的情绪卡：</h3>
      <div class="grid" id="hostEmotionsGrid"></div>

      <button id="hostLockBtn" disabled>
        确认锁定
      </button>

      <div id="hostLockStatusMsg" class="hidden" style="margin-top:10px;font-weight:bold;color:var(--success);">
        ✓ 已锁定
      </div>

      <hr />

      <h3>玩家与分数：</h3>
      <div id="hostPlayerList"></div>

      <button id="revealBtn" style="background: var(--success); margin-top:20px;" disabled>
        结束猜测，揭晓并计分！
      </button>

      <div class="small-note">
        所有人都锁定后才可以揭晓。猜中本轮主持人情绪的玩家 +1 分。
      </div>

      <button id="resetBtn" style="background: var(--danger);">
        删除房间并重新开始
      </button>
    </div>

    <div id="playerScreen" class="hidden">
      <div class="round-box">
        <div>第 <span id="playerRoundNumber">1</span> 回合</div>
        <div>本轮主持人：</div>
        <div class="host-name" id="playerCurrentRoundHost">---</div>
      </div>

      <p>
        你好
        <span id="playerGreeting" style="font-weight:bold; color:var(--primary);"></span>，
        请选择一个你目前持有的情绪卡：
      </p>

      <div class="grid" id="emotionsGrid"></div>

      <button id="lockBtn" style="margin-top: 20px;" disabled>
        确认锁定该情绪
      </button>

      <div id="lockStatusMsg" style="margin-top:10px; font-weight:bold; color:var(--success);" class="hidden">
        ✓ 已锁定！请等待揭晓。
      </div>
    </div>

    <div id="revealScreen" class="hidden">
      <h2>🎉 第 <span id="revealRoundNumber">1</span> 回合结果 🎉</h2>

      <div class="round-box">
        <div>本轮主持人：</div>
        <div class="host-name" id="revealRoundHost">---</div>
        <div class="small-note">
          与主持人选择相同情绪的玩家获得 +1 分。
        </div>
      </div>

      <div id="finalResultsList" style="margin: 20px 0;"></div>

      <button id="nextRoundBtn" class="hidden" style="background: var(--success);">
        下一回合
      </button>

      <button onclick="window.location.reload()" style="background: var(--danger);">
        离开 / 重新载入
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      update,
      get,
      onValue,
      remove,
      serverTimestamp,
      push
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDEaU5Tm2lpc-fH0r9-LJdKuKSF8_h0tf8",
      authDomain: "emo-card-game.firebaseapp.com",
      databaseURL: "https://emo-card-game-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "emo-card-game",
      storageBucket: "emo-card-game.firebasestorage.app",
      messagingSenderId: "621452932692",
      appId: "1:621452932692:web:b92c03843dc9023d42dfc1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const emotionsList = [
      "害怕", "焦虑", "反感", "厌恶",
      "期待", "惊讶", "开心", "接受",
      "伤心", "生气", "尴尬", "失落"
    ];

    let roomId = "";
    let playerId = "";
    let myName = "";
    let selectedEmotion = "";
    let isFacilitator = false;
    let isLocked = false;
    let currentRoundSeen = 0;

    const setupScreen = document.getElementById("setupScreen");
    const hostScreen = document.getElementById("hostScreen");
    const playerScreen = document.getElementById("playerScreen");
    const revealScreen = document.getElementById("revealScreen");
    const setupStatus = document.getElementById("setupStatus");

    function showScreen(screen) {
      setupScreen.classList.add("hidden");
      hostScreen.classList.add("hidden");
      playerScreen.classList.add("hidden");
      revealScreen.classList.add("hidden");
      screen.classList.remove("hidden");
    }

    function setStatus(message) {
      setupStatus.innerText = message || "";
    }

    function generateRoomId() {
      return String(Math.floor(10000 + Math.random() * 90000));
    }

    function getPlayerName(defaultName) {
      return document.getElementById("playerNameInput").value.trim() || defaultName;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getSortedPlayerEntries(players) {
      return Object.entries(players).sort((a, b) => {
        const aOrder = a[1].joinedOrder || 0;
        const bOrder = b[1].joinedOrder || 0;
        return aOrder - bOrder;
      });
    }

    function getPlayerNameById(players, id) {
      return players[id]?.name || "未知玩家";
    }

    async function createUniqueRoom() {
      let newRoomId;
      let exists = true;

      while (exists) {
        newRoomId = generateRoomId();
        const roomSnap = await get(ref(db, "rooms/" + newRoomId));
        exists = roomSnap.exists();
      }

      return newRoomId;
    }

    document.getElementById("createRoomBtn").addEventListener("click", async () => {
      try {
        myName = getPlayerName("房东");
        isFacilitator = true;
        roomId = await createUniqueRoom();

        setStatus("正在创建房间...");

        await set(ref(db, "rooms/" + roomId), {
          status: "waiting",
          currentRound: 1,
          createdAt: serverTimestamp()
        });

        const hostRef = push(ref(db, `rooms/${roomId}/players`));
        playerId = hostRef.key;

        await set(hostRef, {
          name: myName + " (房东)",
          emotion: "",
          locked: false,
          score: 0,
          isFacilitator: true,
          joinedAt: serverTimestamp(),
          joinedOrder: Date.now()
        });

        await update(ref(db, "rooms/" + roomId), {
          facilitatorId: playerId,
          currentHostId: playerId
        });

        document.getElementById("hostRoomIdDisplay").innerText = roomId;
        buildChoiceGrid("hostEmotionsGrid", "hostLockBtn");
        showScreen(hostScreen);
        listenToRoom();
      } catch (err) {
        console.error(err);
        alert("创建房间失败：" + err.message);
      }
    });

    document.getElementById("joinRoomBtn").addEventListener("click", async () => {
      try {
        myName = getPlayerName("");
        roomId = document.getElementById("roomIdInput").value.trim();

        if (!myName) {
          alert("请先输入您的名字！");
          return;
        }

        if (!/^[0-9]{5}$/.test(roomId)) {
          alert("请输入5位数字房间代码！");
          return;
        }

        setStatus("正在加入房间...");

        const roomSnap = await get(ref(db, "rooms/" + roomId));

        if (!roomSnap.exists()) {
          alert("找不到这个房间，请检查代码。");
          setStatus("");
          return;
        }

        const room = roomSnap.val();

        if (room.status === "revealed") {
          alert("这一回合已经揭晓了，请等下一回合再加入。");
          setStatus("");
          return;
        }

        const newPlayerRef = push(ref(db, `rooms/${roomId}/players`));
        playerId = newPlayerRef.key;

        await set(newPlayerRef, {
          name: myName,
          emotion: "",
          locked: false,
          score: 0,
          isFacilitator: false,
          joinedAt: serverTimestamp(),
          joinedOrder: Date.now()
        });

        document.getElementById("playerGreeting").innerText = myName;
        buildChoiceGrid("emotionsGrid", "lockBtn");
        showScreen(playerScreen);
        listenToRoom();
      } catch (err) {
        console.error(err);
        alert("加入房间失败：" + err.message);
      }
    });

    function listenToRoom() {
      onValue(ref(db, "rooms/" + roomId), (snapshot) => {
        if (!snapshot.exists()) {
          alert("房间已被删除或不存在。");
          window.location.reload();
          return;
        }

        const room = snapshot.val();
        const players = room.players || {};
        const roundNumber = room.currentRound || 1;
        const roundHostName = getPlayerNameById(players, room.currentHostId);

        if (roundNumber !== currentRoundSeen && room.status === "waiting") {
          currentRoundSeen = roundNumber;
          resetLocalRoundUI();

          if (isFacilitator) {
            buildChoiceGrid("hostEmotionsGrid", "hostLockBtn");
            showScreen(hostScreen);
          } else {
            buildChoiceGrid("emotionsGrid", "lockBtn");
            showScreen(playerScreen);
          }
        }

        updateRoundLabels(roundNumber, roundHostName);

        if (isFacilitator) {
          updateHostPlayerListUI(players, room.currentHostId);
        }

        if (room.status === "revealed") {
          showFinalRevealUI(room);
        }
      });
    }

    function updateRoundLabels(roundNumber, roundHostName) {
      document.getElementById("hostRoundNumber").innerText = roundNumber;
      document.getElementById("playerRoundNumber").innerText = roundNumber;
      document.getElementById("revealRoundNumber").innerText = roundNumber;

      document.getElementById("hostCurrentRoundHost").innerText = roundHostName;
      document.getElementById("playerCurrentRoundHost").innerText = roundHostName;
      document.getElementById("revealRoundHost").innerText = roundHostName;
    }

    function updateHostPlayerListUI(players, currentHostId) {
      const listContainer = document.getElementById("hostPlayerList");
      listContainer.innerHTML = "";

      let lockedCount = 0;
      const totalPlayers = Object.keys(players).length;

      getSortedPlayerEntries(players).forEach(([id, p]) => {
        if (p.locked) lockedCount++;

        const item = document.createElement("div");
        item.classList.add("player-list-item");

        const hostBadge = id === currentHostId
          ? `<span class="badge host">本轮主持</span>`
          : "";

        item.innerHTML = `
          <span>
            👤 <strong>${escapeHtml(p.name)}</strong>
            ${hostBadge}
            <br>
            <span class="badge score">分数：${p.score || 0}</span>
          </span>
          <span class="badge ${p.locked ? "ready" : "waiting"}">
            ${p.locked ? "✓ 已选择" : "⏳ 选择中"}
          </span>
        `;

        listContainer.appendChild(item);
      });

      document.getElementById("revealBtn").disabled =
        totalPlayers === 0 || lockedCount < totalPlayers;
    }

    function buildChoiceGrid(gridId, lockBtnId) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = "";

      emotionsList.forEach((emotion, index) => {
        const btn = document.createElement("button");
        btn.classList.add("emotion-btn");
        btn.innerText = `${index + 1}. ${emotion}`;

        btn.addEventListener("click", () => {
          if (isLocked) return;

          document.querySelectorAll(`#${gridId} .emotion-btn`).forEach(b => {
            b.classList.remove("selected");
          });

          btn.classList.add("selected");
          selectedEmotion = emotion;
          document.getElementById(lockBtnId).disabled = false;
        });

        grid.appendChild(btn);
      });
    }

    async function lockMyChoice(lockBtnId, statusMsgId, gridId) {
      if (!selectedEmotion || isLocked) return;

      try {
        await update(ref(db, `rooms/${roomId}/players/${playerId}`), {
          emotion: selectedEmotion,
          locked: true,
          lockedAt: serverTimestamp()
        });

        isLocked = true;
        document.getElementById(lockBtnId).disabled = true;
        document.getElementById(statusMsgId).classList.remove("hidden");

        document.querySelectorAll(`#${gridId} .emotion-btn`).forEach(btn => {
          if (!btn.classList.contains("selected")) {
            btn.disabled = true;
            btn.style.opacity = 0.5;
          }
        });
      } catch (err) {
        console.error(err);
        alert("锁定失败：" + err.message);
      }
    }

    document.getElementById("hostLockBtn").addEventListener("click", () => {
      lockMyChoice("hostLockBtn", "hostLockStatusMsg", "hostEmotionsGrid");
    });

    document.getElementById("lockBtn").addEventListener("click", () => {
      lockMyChoice("lockBtn", "lockStatusMsg", "emotionsGrid");
    });

    document.getElementById("revealBtn").addEventListener("click", async () => {
      try {
        const roomSnap = await get(ref(db, "rooms/" + roomId));

        if (!roomSnap.exists()) return;

        const room = roomSnap.val();
        const players = room.players || {};
        const currentHostId = room.currentHostId;
        const hostEmotion = players[currentHostId]?.emotion || "";

        if (!hostEmotion) {
          alert("本轮主持人还没有选择情绪。");
          return;
        }

        const updates = {};
        updates[`rooms/${roomId}/status`] = "revealed";
        updates[`rooms/${roomId}/revealedAt`] = serverTimestamp();
        updates[`rooms/${roomId}/lastHostEmotion`] = hostEmotion;

        Object.entries(players).forEach(([id, p]) => {
          const matched = id !== currentHostId && p.emotion === hostEmotion;

          updates[`rooms/${roomId}/players/${id}/lastGain`] = matched ? 1 : 0;

          if (matched) {
            updates[`rooms/${roomId}/players/${id}/score`] = (p.score || 0) + 1;
          }
        });

        await update(ref(db), updates);
      } catch (err) {
        console.error(err);
        alert("揭晓失败：" + err.message);
      }
    });

    document.getElementById("nextRoundBtn").addEventListener("click", async () => {
      try {
        const roomSnap = await get(ref(db, "rooms/" + roomId));

        if (!roomSnap.exists()) return;

        const room = roomSnap.val();
        const players = room.players || {};
        const entries = getSortedPlayerEntries(players);

        if (entries.length === 0) return;

        const currentHostIndex = entries.findIndex(([id]) => id === room.currentHostId);
        const nextHostIndex = currentHostIndex === -1
          ? 0
          : (currentHostIndex + 1) % entries.length;

        const nextHostId = entries[nextHostIndex][0];
        const nextRound = (room.currentRound || 1) + 1;

        const updates = {};
        updates[`rooms/${roomId}/status`] = "waiting";
        updates[`rooms/${roomId}/currentRound`] = nextRound;
        updates[`rooms/${roomId}/currentHostId`] = nextHostId;
        updates[`rooms/${roomId}/lastHostEmotion`] = "";

        entries.forEach(([id]) => {
          updates[`rooms/${roomId}/players/${id}/emotion`] = "";
          updates[`rooms/${roomId}/players/${id}/locked`] = false;
          updates[`rooms/${roomId}/players/${id}/lastGain`] = 0;
        });

        await update(ref(db), updates);
      } catch (err) {
        console.error(err);
        alert("开始下一回合失败：" + err.message);
      }
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      if (!confirm("确定要删除这个房间并重新开始吗？")) return;

      try {
        await remove(ref(db, "rooms/" + roomId));
        window.location.reload();
      } catch (err) {
        console.error(err);
        alert("删除房间失败：" + err.message);
      }
    });

    function resetLocalRoundUI() {
      selectedEmotion = "";
      isLocked = false;

      document.getElementById("lockBtn").disabled = true;
      document.getElementById("hostLockBtn").disabled = true;

      document.getElementById("lockStatusMsg").classList.add("hidden");
      document.getElementById("hostLockStatusMsg").classList.add("hidden");
    }

    function showFinalRevealUI(room) {
      const players = room.players || {};
      const currentHostId = room.currentHostId;
      const hostEmotion = room.lastHostEmotion || players[currentHostId]?.emotion || "";

      showScreen(revealScreen);

      const nextRoundBtn = document.getElementById("nextRoundBtn");
      if (isFacilitator) {
        nextRoundBtn.classList.remove("hidden");
      } else {
        nextRoundBtn.classList.add("hidden");
      }

      const list = document.getElementById("finalResultsList");
      list.innerHTML = "";

      getSortedPlayerEntries(players).forEach(([id, p]) => {
        const row = document.createElement("div");
        row.classList.add("player-list-item");

        const isRoundHost = id === currentHostId;
        const gained = p.lastGain === 1;

        row.innerHTML = `
          <span>
            👤 <strong>${escapeHtml(p.name || "玩家")}</strong>
            ${isRoundHost ? `<span class="badge host">本轮主持</span>` : ""}
            ${gained ? `<span class="badge plus">+1</span>` : ""}
            <br>
            <span class="badge score">总分：${p.score || 0}</span>
          </span>
          <span style="font-size:18px; font-weight:bold; color:var(--primary);">
            ${escapeHtml(p.emotion || "未选择")}
          </span>
        `;

        list.appendChild(row);
      });
    }
  </script>
</body>
</html>
